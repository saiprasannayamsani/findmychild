{% extends "base.html" %}
{% block content %}
<script>document.body.dataset.page='login';</script>
<style>
.input-icon-wrap { position:relative; }
.input-icon-wrap svg {
  position:absolute; left:13px; top:50%; transform:translateY(-50%);
  width:17px; height:17px; opacity:0.45; pointer-events:none;
}
.input-icon-wrap input { padding-left:40px !important; }
.auth-divider { display:flex;align-items:center;gap:12px;margin:1.2rem 0;color:var(--text-soft);font-size:12px; }
.auth-divider::before,.auth-divider::after { content:'';flex:1;height:1px;background:var(--border); }
</style>
<section class="section">
  <div class="auth-wrap">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:2rem;">
        <div style="width:68px;height:68px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 6px 20px rgba(13,31,60,.25);">
          <!-- Lock icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h2 class="form-title" style="text-align:center;">Welcome Back</h2>
        <p class="form-sub" style="text-align:center;">Login to your ReuniteAI account to report and track cases</p>
      </div>

      <form method="POST" action="/login">
        <div class="form-group">
          <label>Email Address *</label>
          <div class="input-icon-wrap">
            <!-- Email icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" name="email" placeholder="Enter your email address" required autofocus>
          </div>
        </div>

        <div class="form-group">
          <label>Password *</label>
          <div class="input-icon-wrap">
            <!-- Key icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
            <input type="password" name="password" placeholder="Enter your password" required>
          </div>
        </div>

        <button type="submit" class="submit-btn">
          <!-- Arrow right icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Login to Your Account
        </button>
      </form>

      <div class="auth-divider">or</div>

      <div style="text-align:center;font-size:13.5px;color:var(--text-soft);">
        Don't have an account?
        <a href="/register" style="color:var(--teal);font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-left:4px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
          Register Free →
        </a>
      </div>

      <div class="info-box" style="margin-top:1.2rem;">
        <div class="info-box-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div>Login is required to file complaints. This ensures all reports are traceable and prevents misuse of the system.</div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
